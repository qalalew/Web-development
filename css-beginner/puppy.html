<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Puppy Lovers Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background-color: #f9f9f9;
      color: #222;
    }

    /* ── Header ── */
    header {
      background-color: #1a4f8a;
      color: #fff;
      text-align: center;
      padding: 20px;
      font-size: 1.6rem;
      font-weight: bold;
    }

    /* ── Hero Image ── */
    .hero {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    /* ── Three-column grid ── */
    .grid-three {
      display: flex;
      justify-content: center;
      gap: 0;
      margin: 40px auto;
      max-width: 680px;
    }

    .grid-three img {
      width: 220px;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .missing-box {
      width: 220px;
      height: 220px;
      background-color: #e91e8c;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.3rem;
      color: #111;
      line-height: 1.4;
    }

    /* ── More Puppies heading ── */
    .more-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      margin: 10px 0 30px;
    }

    /* ── Two-column grid ── */
    .grid-two {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 0 auto 60px;
      max-width: 700px;
    }

    .grid-two img {
      width: 320px;
      height: 280px;
      object-fit: cover;
      display: block;
      border-radius: 4px;
    }

    /* ── Footer ── */
    footer {
      background-color: #1a4f8a;
      color: #fff;
      text-align: center;
      padding: 40px 20px;
      font-size: 1.3rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>Puppy lovers page</header>

  <!-- Hero Image -->
  <img
    class="hero"
    src="Resources/banner-puppies.jpg"
    alt="Puppies in a basket"
  />

  <!-- Three-column section -->
  <div class="grid-three">
    <img
      src="Resources/puppy-1.jpg"
      alt="White fluffy puppy"
    />
    <div class="missing-box">Puppy<br>missing<br>here!!</div>
    <img
      src="Resources/puppy-2.jpg"
      alt="Black and white puppy"
    />
  </div>

  <!-- More Puppies heading -->
  <h2 class="more-title">More Puppies</h2>

  <!-- Two-column section -->
  <div class="grid-two">
    <img
      src="Resources/puppy-3.jpg"
      alt="Brown puppy being held"
    />
    <img
      src="Resources/puppy-4.jpg"
      alt="White fluffy dog on floor"
    />
  </div>

  <!-- Footer -->
  <footer>Developed by: Kalalew Terefe </footer>

</body>
</html>
